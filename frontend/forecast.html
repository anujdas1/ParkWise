<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkWise — Forecast</title>
  <meta name="description" content="View predicted Enforcement Impact Score (EIS) forecasts and model metrics.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-header">
    <h1>Forecast Model Metrics</h1>
    <p class="subtitle">Evaluating hurdle model performance against naive baselines.</p>
  </div>

  <div class="stats-grid" id="metricsGrid">
    <div class="stat-card"><div class="stat-label">Model MAE</div><div class="stat-value" id="valMAE">—</div></div>
    <div class="stat-card"><div class="stat-label">Model RMSE</div><div class="stat-value" id="valRMSE">—</div></div>
    <div class="stat-card"><div class="stat-label">MAE Impr. vs Naive</div><div class="stat-value" style="color:var(--success)" id="valMAEImp">—</div></div>
    <div class="stat-card"><div class="stat-label">RMSE Impr. vs Naive</div><div class="stat-value" style="color:var(--success)" id="valRMSEImp">—</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>📈 72-Hour EIS Forecast (Top Zone)</h3>
      <div class="control-group">
        <label for="zoneSelect">Zone:</label>
        <select id="zoneSelect">
          <option value="">Loading...</option>
        </select>
      </div>
    </div>
    <div class="card-body">
      <div class="chart-container">
        <canvas id="forecastChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forecast.js"></script>
</body>
</html>
