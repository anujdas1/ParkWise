<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkWise — Hotspot Map</title>
  <meta name="description" content="Visualize all traffic violation hotspots on an interactive map.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="page-header">
    <h1>Hotspot Map</h1>
    <p class="subtitle">All forecast zones plotted by predicted Enforcement Impact Score (EIS).</p>
  </div>

  <div class="controls-bar">
    <div class="toggle-group">
      <input type="checkbox" id="highRiskOnly">
      <label for="highRiskOnly">High risk only (EIS &gt; 5)</label>
    </div>
    <div class="control-group">
      <label for="colorBy">Color by:</label>
      <select id="colorBy">
        <option value="eis">Predicted EIS</option>
        <option value="prob">Occurrence Probability</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-body no-pad">
      <div class="map-container full-height" id="hotspotsMap"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/api.js"></script>
  <script src="js/hotspots.js"></script>
</body>
</html>
