<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkWise — Analytics</title>
  <meta name="description" content="Aggregate analytics and descriptive statistics for traffic enforcement.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-header">
    <h1>Descriptive Analytics</h1>
    <p class="subtitle">Macro-level distribution of congestion risk across all monitored zones.</p>
  </div>

  <div class="content-grid equal">
    <div class="card">
      <div class="card-header">
        <h3>📊 Risk Distribution (Histogram)</h3>
      </div>
      <div class="card-body">
        <div class="chart-container">
          <canvas id="distChart"></canvas>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>🕒 EIS by Time of Day</h3>
      </div>
      <div class="card-body">
        <div class="chart-container">
          <canvas id="timeChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:1.5rem">
    <div class="card-header">
      <h3>📈 Top 30 High-Risk Zones (Cumulative)</h3>
    </div>
    <div class="card-body">
      <div class="chart-container" style="height: 400px;">
        <canvas id="topZonesChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/api.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
