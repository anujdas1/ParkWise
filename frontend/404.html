<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — DarogaDesk</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    body {
      background: linear-gradient(135deg, var(--bg-body) 0%, var(--bg-surface) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-container {
      max-width: 500px;
      animation: fadeInUp 0.5s ease-out;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, var(--accent), var(--text-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .error-msg {
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      padding: 0.875rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-glow);
      text-decoration: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
  </style>
  <script src="js/theme.js"></script>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Oops! That page can't be found.</h1>
    <p class="error-msg">It looks like the link is broken or the page has been moved. Let's get you back on track.</p>
    <a href="index.html" class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.25rem;height:1.25rem"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Homepage
    </a>
  </div>

  <script>
    // Quick script to handle theme switcher logic so the page looks consistent
    const savedTheme = localStorage.getItem('parkwise-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
